# Tailscale exit node on Fly using the official tailscale/tailscale image —
# no Dockerfile, no start.sh. See README.md for how and why.

app = "tailwings"
primary_region = "nrt"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  image = "tailscale/tailscale:latest"

[env]
  TS_USERSPACE = "false"
  TS_EXTRA_ARGS = "--advertise-exit-node --advertise-tags=tag:fly-exit"
  # native health endpoint, served by containerboot
  TS_ENABLE_HEALTH_CHECK = "true"
  TS_LOCAL_ADDR_PORT = "0.0.0.0:9002"

# The one thing containerboot won't do on Fly: enable IP forwarding (required for
# exit/subnet routing). Enable it, set a per-region hostname, then exec the
# image's original entrypoint.
[experimental]
  cmd = ["/bin/sh", "-c", "echo 1 > /proc/sys/net/ipv4/ip_forward; echo 1 > /proc/sys/net/ipv6/conf/all/forwarding; export TS_HOSTNAME=fly-$FLY_REGION; exec /usr/local/bin/containerboot"]

[[services]]
  protocol = "udp"
  internal_port = 41641
  processes = ["app"]

  [[services.ports]]
    port = 41641

[checks]
  [checks.health]
    type = "http"
    port = 9002
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
