name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Shellcheck scripts
        run: shellcheck -s sh start.sh healthz .github/scripts/smoke-test.sh .github/scripts/prune-ghcr.sh

      - name: Hadolint Dockerfile
        # Run hadolint's image directly (digest-pinned) rather than the
        # third-party action wrapper. Auto-detects .hadolint.yaml from /repo.
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            hadolint/hadolint@sha256:30a8fd2e785ab6176eed53f74769e04f125afb2f74a6c52aef7d463583b6d45e \
            hadolint Dockerfile

      - name: Validate fly.toml parses
        # Note: `fly config validate` is a server-side check that needs a Fly
        # API token, so we keep CI token-free and just check it's valid TOML.
        run: |
          python3 -c "import tomllib; tomllib.load(open('fly.toml','rb')); print('fly.toml is valid TOML')"

  build:
    name: build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t fly-tailscale-exit:ci .

      - name: Smoke test — healthz serves 503 without auth
        run: ./.github/scripts/smoke-test.sh fly-tailscale-exit:ci
