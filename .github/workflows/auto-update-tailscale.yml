name: Auto Update Tailscale

on:
  schedule:
    - cron:  '0 0 * * 0'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# contents: write to push the version-bump commit; issues: write to open a
# failure issue (see the last step); actions: write to dispatch the publish
# workflow after a bump (a GITHUB_TOKEN push can't trigger it directly).
permissions:
  contents: write
  issues: write
  actions: write

jobs:
  update_tailscale:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tailscale version and update Dockerfile
        id: bump
        run: |
          current_version=$(head -n1 Dockerfile | sed -e "s/^ARG TSVERSION=//")
          latest_version=$(curl https://pkgs.tailscale.com/stable/ | grep tailscale_ -m 1 | cut -d'_' -f 2)
          echo "current=$current_version  latest=$latest_version"
          if [ "$current_version" != "$latest_version" ]; then
            sed -i "1 s/.*/ARG TSVERSION=$latest_version/" Dockerfile
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$latest_version" >> "$GITHUB_OUTPUT"
          fi

      # Gate the commit on the same checks that a version bump can actually break:
      # the image must still build, and the running container must still serve the
      # health endpoint. (The lint/shellcheck/toml checks only cover files this
      # bump doesn't touch.) If either step fails, the job stops and nothing is
      # pushed — the implicit success() on the commit step's `if` ensures that.
      - name: Build image with the new version
        if: steps.bump.outputs.changed == 'true'
        run: docker build -t fly-tailscale-exit:autoupdate .

      - name: Smoke test — healthz serves 503 without auth
        if: steps.bump.outputs.changed == 'true'
        run: ./.github/scripts/smoke-test.sh fly-tailscale-exit:autoupdate

      - name: Commit and push
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config --global user.name "GitHub Action: auto update tailscale"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: auto update tailscale to ${{ steps.bump.outputs.version }}"
          git push

      # A push made with GITHUB_TOKEN does not trigger other workflows, so start
      # the publish explicitly. workflow_dispatch via the API is exempt from that
      # rule, so this needs no PAT — just actions: write above.
      - name: Trigger image publish
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish.yml --ref main

      # A weekly scheduled run that goes red is easy to miss, so surface failures
      # explicitly. De-dupe: comment on the existing open issue rather than
      # opening a new one every week until it's fixed and closed.
      - name: Open an issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Auto-update tailscale failed"
          existing=$(gh issue list --state open --json number,title \
            --jq ".[] | select(.title == \"$title\") | .number" | head -n1)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Failed again: $RUN_URL"
          else
            gh issue create --title "$title" \
              --body "The scheduled tailscale auto-update workflow failed (build or smoke test). Run: $RUN_URL"
          fi
